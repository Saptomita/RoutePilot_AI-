<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Configuration | RoutePilot AI</title>

  <!-- Global Stylesheet -->

  <link rel="stylesheet" href="./src/style.css" />
  <!-- Profile-specific Styles -->
  <link rel="stylesheet" href="./src/profile.css" />

  <!-- Google Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body class="profile-layout">
  <div id="app" class="profile-container">

    <!-- Header -->
    <header class="settings-header">
      <div class="logo-group">
        <img src="./logo.png" alt="RoutePilot" class="settings-logo-img" />
        <div class="logo">
          <h1>RoutePilot <span class="accent">Settings</span></h1>
        </div>
      </div>

      <button id="back-btn" class="settings-nav-btn">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Return to Dashboard
      </button>
    </header>

    <div class="profile-grid">

      <!-- Sidebar -->
      <aside class="profile-sidebar">
        <section class="glass-panel identity-card">
          <div class="avatar-container">
            <div class="avatar-ring">
              <img src="https://ui-avatars.com/api/?name=Admin+User&background=0b1121&color=fff&size=200"
                alt="Profile Avatar" />
            </div>
          </div>

          <h2 id="display-name" class="profile-name">Admin User</h2>
          <p class="profile-role">Fleet Commander</p>

          <div class="stat-strip">
            <div class="stat-item">
              <span class="stat-label">Evaluated Journeys</span>
              <span class="stat-value">1,402</span>
            </div>
          </div>
        </section>
      </aside>

      <!-- Main Content -->
      <main class="settings-content">
        <form id="settings-form">

          <!-- Identity -->
          <section class="glass-panel settings-card">
            <h3 class="card-title">👤 Identity & Access</h3>

            <div class="settings-form-grid">
              <div class="input-group">
                <label for="profile-name">Full Operator Name</label>
                <input type="text" id="profile-name" value="Admin User" />
              </div>

              <div class="input-group">
                <label for="profile-phone">Verified Contact</label>
                <input type="tel" id="profile-phone" />
              </div>
            </div>
          </section>

          <!-- Preferences -->
          <section class="glass-panel settings-card" style="margin-top: 32px;">
            <h3 class="card-title">⚙️ System & Intelligence</h3>

            <div class="settings-form-grid">
              <div class="input-group">
                <label for="theme-preset">Map Theme</label>
                <select id="theme-preset">
                  <option>Dark</option>
                  <option>Light</option>
                </select>
              </div>

              <div class="input-group">
                <label for="vehicle-type">Vehicle Type</label>
                <select id="vehicle-type">
                  <option>Truck</option>
                  <option>Van</option>
                </select>
              </div>
            </div>

            <div class="form-actions" style="margin-top: 24px;">
              <button type="submit" class="save-btn">Save Settings</button>
            </div>
          </section>

        </form>
      </main>
    </div>

  </div>

  <!-- JS -->

  <script type="module" src="./src/profile.js"></script>

  <!-- Navigation Fix -->

  <script>
    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = './index.html';
    });
  </script>

</body>

</html>
