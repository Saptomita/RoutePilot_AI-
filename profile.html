<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoutePilot AI | Settings</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./src/style.css" />
  <link rel="stylesheet" href="./src/profile.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body class="profile-layout">
  <div id="app" class="profile-container">
    <main class="profile-shell">
      <header class="settings-header glass-panel">
        <div class="logo">
          <h1>RoutePilot <span class="accent">Settings</span></h1>
        </div>
        <button id="back-btn" class="settings-nav-btn" type="button">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Return to Dashboard
        </button>
      </header>

      <div class="profile-grid">
        <aside class="profile-sidebar">
          <section class="glass-panel identity-card">
            <div class="avatar-container">
              <div class="avatar-ring">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=0b1121&color=fff&size=200"
                  alt="Profile Avatar" />
              </div>
            </div>
            <h2 id="display-name" class="profile-name">Admin User</h2>
            <p class="profile-role">System Identity</p>
          </section>
        </aside>

        <section class="settings-content">
          <form id="settings-form">
            <div class="glass-panel settings-card">
              <h3 class="card-title">👤 Account Settings</h3>

              <div class="settings-form-grid">
                <div class="input-group">
                  <label for="profile-name" class="input-label">Full Name</label>
                  <input id="profile-name" class="input-field" type="text" placeholder="Enter your name" />
                </div>

                <div class="input-group">
                  <label for="profile-phone" class="input-label">Phone Number</label>
                  <input id="profile-phone" class="input-field" type="tel" placeholder="Enter phone number" />
                </div>

                <div class="input-group">
                  <label for="profile-email" class="input-label">Email</label>
                  <input id="profile-email" class="input-field" type="email" placeholder="Enter email" />
                </div>

                <div class="input-group">
                  <label for="profile-password" class="input-label">Password</label>
                  <input id="profile-password" class="input-field" type="password" placeholder="Enter password" />
                </div>
              </div>
            </div>

            <div class="glass-panel settings-card" style="margin-top: 32px;">
              <h3 class="card-title">⚙️ System Preferences</h3>

              <div class="settings-form-grid">
                <div class="input-group">
                  <label for="theme-preset" class="input-label">Theme Preset</label>
                  <select id="theme-preset" class="input-field select-field">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                  </select>
                </div>

                <div class="input-group">
                  <label for="weather-source" class="input-label">Weather Source</label>
                  <select id="weather-source" class="input-field select-field">
                    <option value="live">Live API</option>
                    <option value="simulated">Simulated</option>
                  </select>
                </div>

                <div class="input-group full-width">
                  <label for="vehicle-type" class="input-label">Vehicle Type</label>
                  <select id="vehicle-type" class="input-field select-field">
                    <option value="car">Car</option>
                    <option value="bike">Bike</option>
                    <option value="truck">Truck</option>
                  </select>
                </div>

                <div class="full-width" style="margin-top: 16px;">
                  <label class="toggle-group" for="notifications-toggle">
                    <input id="notifications-toggle" type="checkbox" />
                    <span class="toggle-text">Enable System Notifications</span>
                  </label>
                </div>
              </div>

              <div class="form-actions" style="margin-top: 32px;">
                <button type="submit" class="save-btn">
                  <span>Save Settings</span>
                </button>
              </div>
            </div>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="./src/profile.js"></script>
</body>

</html>
